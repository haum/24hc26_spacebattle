<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>2D view</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
		html, body, canvas {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			box-sizing: border-box;
			overflow: hidden;
		}
		body {
			overscroll-behavior: none;
			user-select: none;
		}
		</style>
	</head>
	<body>
		<canvas id="canvas"></canvas>
		<script type="module">
			const canvas = document.getElementById('canvas');
			const ctx = canvas.getContext('2d');
			let mouseinfo = ['-'];

			function resize() {
				const dpr = Math.max(1, window.devicePixelRatio || 1);
				canvas.width = Math.floor(canvas.clientWidth * dpr);
				canvas.height = Math.floor(canvas.clientHeight * dpr);
				ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
				requestAnimationFrame(draw);
			}
			window.addEventListener('resize', resize);
			resize();

			function draw() {
				// Background
				const dark = window.matchMedia &&
					window.matchMedia('(prefers-color-scheme: dark)').matches;
				const bg = dark ? '#0f1115' : '#f4f4f6';
				const fg = !dark ? '#0f1115' : '#f4f4f6';

				ctx.fillStyle = bg;
				ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

				// Utilities
				const grid_sz = objs?.size ?? [50, 50];
				const S = Math.min(canvas.width / (grid_sz[0] + 1), canvas.height / (grid_sz[1] + 1))
				const grid_orig = [
						(canvas.width-grid_sz[0]*S)/2,
						(canvas.height-grid_sz[1]*S)/2,
				];
				const sqs = positions => {
					const path = new Path2D();
					for (const [x, y] of positions)
						path.rect(grid_orig[0]+x*S, grid_orig[1]+y*S, S, S);
					ctx.fill(path);
				}

				// Border
				ctx.strokeStyle = fg;
				const border_path = new Path2D();
				border_path.rect(...grid_orig, ...grid_sz.map(v => v*S));
				ctx.stroke(border_path);

				// Vessels
				ctx.fillStyle = '#ffcc00';
				if ('vessels' in objs) sqs(objs['vessels'].map(v => v[1]));

				// Mouseinfo
				ctx.fillStyle = fg;
				ctx.font = "2em Arial";
				mouseinfo.forEach(
					(line, i) => ctx.fillText(line, 20, 20+(i+1)*40)
				);

				// Disconnected
				if (ws.readyState != WebSocket.OPEN) {
					ctx.fillStyle = '#ff0000';
					ctx.globalAlpha = 0.8;
					ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);
					ctx.globalAlpha = 1.0;
				}
			}

			requestAnimationFrame(draw);

			let objs = {};
			const ws = new WebSocket(
				((location.protocol === 'https:') ? 'wss' : 'ws') + '://' +
				location.host + '/ws'
			);

			ws.onmessage = e => {
				const msg = JSON.parse(e.data)
				if (msg.type == 'hello') {
					const u = window.prompt('universe');
					ws.send(JSON.stringify({
						type: 'rq_world_report',
						dt: 0.5,
						universe: u,
					}));
				} else if (msg.type == 'world_report') {
					objs = msg;
					requestAnimationFrame(draw);
				} else {
					console.warn('Unknown', msg)
				}
			};

			ws.onclose = e => {
				alert('Disconnected: ' + e.reason);
				requestAnimationFrame(draw);
			}
			ws.onerror = e => {
				console.error(e);
				requestAnimationFrame(draw);
			}

			canvas.onmousemove = e => {
				const grid_sz = objs?.size ?? [50, 50];
				const S = Math.min(canvas.width / (grid_sz[0] + 1), canvas.height / (grid_sz[1] + 1))
				const grid_orig = [
						(canvas.width-grid_sz[0]*S)/2,
						(canvas.height-grid_sz[1]*S)/2,
				];

				const rect = canvas.getBoundingClientRect();
				const x = Math.floor((e.clientX - rect.left - grid_orig[0])/S);
				const y = Math.floor((e.clientY - rect.top - grid_orig[1])/S);

				const prev_mouseinfo = mouseinfo.join('\n');
				if (x < 0 || y < 0 || x >= grid_sz[0] || y >= grid_sz[1]) {
					mouseinfo = ['-'];
				} else {
					mouseinfo = [`(${x};${y})`];
					if ('vessels' in objs)
						mouseinfo.push(
							...objs['vessels']
							.filter(v => v[1][0] == x && v[1][1] == y)
							.map(v => `Vessel(${v[0]})`)
						)
				}
				if (mouseinfo.join('\n') != prev_mouseinfo)
					requestAnimationFrame(draw);
			};

			canvas.onmouseleave = _ => { mouseinfo = ['-']; };
		</script>
	</body>
</html>
